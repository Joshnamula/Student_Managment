{% extends "base.html" %}
{% block content %}

<div class="dashboard-card">
    <h2>Update Student</h2>
    <form method="POST">
        <input type="text" name="name" value="{{ student['name'] }}">
        <input type="number" name="marks" value="{{ student['marks'] }}">
        <button type="submit">Update</button>
    </form>
</div>

{% endblock %}
