{% extends "base.html" %}
{% block content %}

<div class="dashboard-title">Dashboard</div>

<!-- Stat Card Container -->
<div class="card-container">
    <div class="stat-card blue">
        <div>
            <h4>Total No. of Students</h4>
            <span>{{ total_students }}</span>
        </div>
    </div>
</div>

<h2>All Students</h2>

<table>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Marks</th>
        <th>Grade</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student['roll_no'] }}</td>
        <td>{{ student['name'] }}</td>
        <td>{{ student['marks'] }}</td>
        <td>{{ student['grade'] }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
