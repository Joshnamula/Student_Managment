{% extends "base.html" %}
{% block content %}

<h2>All Students</h2>

<table>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Marks</th>
        <th>Grade</th>
        <th>Actions</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student['roll_no'] }}</td>
        <td>{{ student['name'] }}</td>
        <td>{{ student['marks'] }}</td>
        <td>{{ student['grade'] }}</td>
        <td>
            <a href="/update/{{ student['id'] }}" class="action-btn edit-btn">Update</a>
            <a href="/delete/{{ student['id'] }}" class="action-btn delete-btn" onclick="return confirm('Are you sure you want to delete this student?');">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
